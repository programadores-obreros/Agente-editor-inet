<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Profe Bot — mockup cables (1 fila: servo)</title>
<style>
  /* ====== PALETA + TOKENS (no infantil: grises fríos, acentos saturados pero serios) ====== */
  :root{
    --tinta:#1f2933;        /* texto principal */
    --tinta-suave:#67727e;  /* texto secundario / GPIO */
    --linea:#e3e8ee;        /* separadores */
    --riel:#cbd2d9;         /* color del bus/riel del ESP32 */
    --papel:#ffffff;
    --grosor-cable:4px;     /* grosor moderno: ni hilo ni manguera */
    --radio-curva:10px;     /* curva suave en los codos */
  }
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
       background:#f7f9fb;color:var(--tinta);margin:0;padding:40px;}
  .demo{max-width:560px;margin:0 auto;background:var(--papel);border:1px solid var(--linea);
        border-radius:18px;padding:8px 22px;box-shadow:0 1px 3px rgba(16,24,40,.04),0 8px 24px rgba(16,24,40,.05);}

  /* ====== LA FILA: 3 columnas → [riel | conexiones+cables | pieza] ====== */
  /* riel: 22px  | zona de cables/labels: 1fr | pieza: 150px */
  .fila{
    display:grid;
    grid-template-columns:22px 1fr 150px;
    align-items:stretch;          /* el riel ocupa TODO el alto de la fila */
    gap:0;
    padding:18px 0;
    position:relative;
  }

  /* --- COLUMNA 1: el riel/bus vertical del ESP32 --- */
  .riel{
    position:relative;
    width:100%;
  }
  /* la barra vertical continua (la "bornera") */
  .riel::before{
    content:"";
    position:absolute;
    left:50%; top:0; bottom:0;
    width:4px; transform:translateX(-50%);
    background:linear-gradient(var(--riel),var(--riel));
    border-radius:4px;
  }
  /* etiqueta "ESP32" rotada sobre el riel (solo en la 1ª fila si querés) */

  /* --- COLUMNA 2: conexiones. Cada pin es una fila flex con su cable --- */
  .conex{display:flex;flex-direction:column;justify-content:center;gap:14px;padding:4px 0;}

  .pin{
    display:flex;
    align-items:center;
    gap:10px;
    position:relative;
    --c:#888;                     /* color del cable, lo pisa el inline style */
  }

  /* el "nodo" donde el cable toca el riel (reemplaza al dot viejo) */
  .pin .nodo{
    width:11px;height:11px;border-radius:50%;
    background:var(--c);
    box-shadow:0 0 0 3px color-mix(in srgb,var(--c) 18%,transparent);
    flex:none;
    margin-left:-16px;            /* lo empuja sobre el riel de la izq */
    z-index:2;
  }

  /* el CABLE: línea horizontal de color que crece para llenar el espacio
     entre el label y la pieza. flex:1 → siempre toca la pieza, sin importar el ancho */
  .pin .cable{
    flex:1 1 auto;
    height:var(--grosor-cable);
    background:var(--c);
    border-radius:99px;
    min-width:24px;
    position:relative;
  }
  /* terminal (conector) pegada a la pieza, del lado derecho del cable */
  .pin .cable::after{
    content:"";
    position:absolute;right:-1px;top:50%;transform:translateY(-50%);
    width:9px;height:9px;border-radius:2px;
    background:var(--c);
  }

  /* el label del pin: nombre + GPIO. queda ENTRE el nodo y el cable */
  .pin .label{
    display:flex;flex-direction:column;line-height:1.15;flex:none;
    background:var(--papel);      /* tapa el cable si se solapa: el texto manda */
    padding:0 8px;border-radius:6px;
  }
  .pin .label .nom{font-size:13px;font-weight:600;letter-spacing:-.01em;}
  .pin .label .gpio{font-size:11px;color:var(--tinta-suave);font-variant-numeric:tabular-nums;}

  /* --- COLUMNA 3: la pieza Wokwi (acá un placeholder) --- */
  .pieza-cell{display:flex;align-items:center;justify-content:flex-start;min-height:90px;}
  .pieza-fake{width:120px;height:78px;border-radius:12px;
              background:repeating-linear-gradient(45deg,#eef1f5,#eef1f5 6px,#e7ebf0 6px,#e7ebf0 12px);
              border:1px solid var(--linea);display:flex;align-items:center;justify-content:center;
              font-size:11px;color:var(--tinta-suave);text-align:center;}
</style>
</head>
<body>
  <div class="demo">

    <div class="fila">
      <!-- COL 1: riel del ESP32 -->
      <div class="riel"></div>

      <!-- COL 2: 3 pines, cada uno con su cable de color -->
      <div class="conex">
        <div class="pin" style="--c:#e74c3c">
          <span class="nodo"></span>
          <span class="label"><span class="nom">VCC</span><span class="gpio">VIN · 5V</span></span>
          <span class="cable"></span>
        </div>
        <div class="pin" style="--c:#f39c12">
          <span class="nodo"></span>
          <span class="label"><span class="nom">Señal</span><span class="gpio">GPIO18</span></span>
          <span class="cable"></span>
        </div>
        <div class="pin" style="--c:#5d4037">
          <span class="nodo"></span>
          <span class="label"><span class="nom">GND</span><span class="gpio">tierra</span></span>
          <span class="cable"></span>
        </div>
      </div>

      <!-- COL 3: la pieza Wokwi real iría acá -->
      <div class="pieza-cell">
        <div class="pieza-fake">&lt;wokwi-servo&gt;</div>
      </div>
    </div>

  </div>
</body>
</html>
